# ════════════════════════════════════════════════════════════════
# netlify.toml — ATLAS Netlify Deployment Config
# ════════════════════════════════════════════════════════════════

[build]
  publish   = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── API calls → serverless function ──────────────────────────
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# ── Admin panel ───────────────────────────────────────────────
[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

# ── All other routes → index.html (prevents 404) ─────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"
